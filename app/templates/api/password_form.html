<!DOCTYPE html>
<html>
<head><title>Secure Download</title></head>
<body>
  <h2>Enter Password to Download</h2>
  {% if error %}
    <p style="color: red;">{{ error }}</p>
  {% endif %}
  <form method="post">
    <input type="password" name="password" required>
    <button type="submit">Download</button>
  </form>
</body>
</html>
